name: Robot UI Tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  robot-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite: [ login, checkout ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Initialize Robot Framework Browser
        run: |
          rfbrowser init

      - name: Run Robot Framework tests (${{ matrix.suite }})
        run: |
          robot -d results tests/${{ matrix.suite }}

      # log.html, report.html, output.xml, screenshots e videos da suíte
      - name: Upload Robot results (${{ matrix.suite }})
        uses: actions/upload-artifact@v4
        with:
          name: robot-results-${{ matrix.suite }}
          path: results
